services:
  mysql-db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bookstore_mysql
      MYSQL_USER: bookstore_user
      MYSQL_PASSWORD: bookstore_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts/init-customer-db.sql:/docker-entrypoint-initdb.d/init-customer-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-db:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: bookstore_postgres
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore_user -d bookstore_postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./customer-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=customer_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./auth-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=auth_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - JWT_SECRET=bookstore-jwt-secret
      - JWT_ISSUER=bookstore-auth-service
      - JWT_AUDIENCE=bookstore-clients
    depends_on:
      postgres-db:
        condition: service_healthy

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./book-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=bookstore_mysql
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=mysql-db
      - DB_PORT=3306
    depends_on:
      mysql-db:
        condition: service_healthy

  clothe-service:
    build: ./clothe-service
    ports:
      - "8013:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./clothe-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=clothe_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=postgres-db
      - DB_PORT=5432
    depends_on:
      postgres-db:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./cart-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=bookstore_postgres
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=postgres-db
      - DB_PORT=5432
    depends_on:
      postgres-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8004:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./order-service:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=order_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=postgres-db
      - DB_PORT=5432
    depends_on:
      postgres-db:
        condition: service_healthy

  staff-service:
    build: ./staff-service
    ports:
      - "8005:8000"
    command: sh -c "python manage.py makemigrations app && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:

    environment:
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=staff_db
      - DB_USER=bookstore_user
      - DB_PASSWORD=bookstore_pass
      - DB_HOST=postgres-db
      - DB_PORT=5432
    depends_on:
